<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Iniciando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A0A;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            -webkit-app-region: drag;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            margin-bottom: 24px;
            animation: pulse 2s infinite ease-in-out;
        }

        .logo-shadow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #6366f1;
            filter: blur(30px);
            opacity: 0.3;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #71717a;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .loader {
            width: 200px;
            height: 4px;
            background: #18181b;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 50%;
            height: 100%;
            background: #6366f1;
            position: absolute;
            animation: loading 1.5s infinite ease-in-out;
            border-radius: 2px;
        }

        @keyframes loading {
            0% { left: -50%; width: 25%; }
            50% { left: 25%; width: 50%; }
            100% { left: 100%; width: 25%; }
        }

        .footer {
            position: absolute;
            bottom: 24px;
            font-size: 11px;
            font-weight: 600;
            color: #3f3f46;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="logo-shadow"></div>
    <div class="logo-container">
        <svg style="width: 50px; height: 50px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
    </div>
    <div class="title">Factura<span style="color: #818cf8;">Pro</span></div>
    <div class="subtitle">Conectando con el servidor interno...</div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>
    <div class="footer">Sistema de Facturación v1.0.0</div>
</body>
</html>
